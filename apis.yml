apis:
  - aid: aylien:news-api
    name: AYLIEN News API
    description: The AYLIEN News API provides access to NLP-enriched news articles from over 80,000 public and licensed sources. It enables searching, filtering, and analyzing global news content with endpoints for stories, timeseries, trends, clusters, and coverages. Each article is enriched with entities, sentiment, concepts, categories, and other NLP metadata.
